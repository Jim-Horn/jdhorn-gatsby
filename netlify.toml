[build]
  # Specify Node.js version for builds
  environment = { NODE_VERSION = "22" }

  # Clean first so persisted Gatsby cache cannot reference removed plugins (e.g. after dropping GA).
  command = "yarn clean && yarn build"
  
  # Default publish directory for Gatsby
  publish = "public"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true
